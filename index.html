<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ 3D CYBER BLAST PRO ⚡</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: monospace; color: #fff; user-select: none; touch-action: none; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 8px; border: 1px solid #0f0; width: 85%; max-width: 320px; }
        input, button { padding: 12px; margin: 6px 0; border-radius: 6px; border: none; font-family: monospace; font-weight: bold; width: 100%; box-sizing: border-box;}
        input { background: #111; color: #fff; border: 1px solid #333; text-align: center; font-size: 1.2rem; }
        button { background: #0f0; color: #000; cursor: pointer; font-size: 1rem; }
        
        #copy-btn { background: #334155; color: #fff; padding: 6px 12px; font-size: 11px; display: inline-block; width: auto; margin-left: 10px; border-radius: 4px;}
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #0f0; font-size: 28px; pointer-events: none; z-index: 5; display: none;}
        #msg { position: absolute; top: 15%; width: 100%; text-align: center; font-size: 24px; color: #ff0055; text-shadow: 0 0 10px #ff0055; z-index: 6; pointer-events: none;}
        
        /* HUD Display */
        #hud { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 5px; font-size: 18px; border: 1px solid #ff0055; display: none; z-index: 7;}
        
        /* Mobile Overlay Buttons */
        #mobile-controls { display: none; position: absolute; bottom: 30px; right: 30px; z-index: 8; gap: 15px; }
        .m-btn { width: 70px; height: 70px; border-radius: 50%; color: white; font-weight: bold; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px currentColor; }
        #fire-btn { background: rgba(255, 0, 85, 0.7); border: 3px solid #ff0055; color: #ff0055;}
        #jump-btn { background: rgba(0, 255, 204, 0.7); border: 3px solid #00ffcc; color: #00ffcc;}
    </style>
</head>
<body>

    <div id="crosshair">+</div>
    <div id="msg"></div>
    <div id="hud">HEALTH: <span id="hp-val" style="color: #00ffcc;">100</span>%</div>

    <div id="mobile-controls">
        <div id="jump-btn" class="m-btn">JUMP</div>
        <div id="fire-btn" class="m-btn">FIRE</div>
    </div>

    <div id="ui">
        <h3>⚡ Cyber Blast 3D Pro</h3>
        <p>Your Room Code: <b id="my-id" style="color:#0f0; font-size: 1.4rem;">...</b> 
           <button id="copy-btn" onclick="copyRoomCode()">Copy</button>
        </p>
        <input type="number" id="peer-id" placeholder="Enter Room Code" pattern="\d*"><br>
        <button onclick="connectToFriend()">Connect & Play</button>
        <p style="font-size:10px; color:#aaa; line-height:1.4;">PC: WASD to Move | Mouse or Arrow Keys to Look Up/Down/Left/Right | SPACE to Jump | Click to Shoot</p>
    </div>

    <script>
        let peer, conn, role = "";
        let scene, camera, renderer;
        
        // Player stats and orientation logic
        let me = { x: 0, y: 0, z: 0, rotY: 0, rotX: 0, velocityY: 0, hp: 100, gunMesh: null, laserMesh: null };
        let opponent = { group: null, laserMesh: null };
        
        const GRAVITY = -0.015;
        const JUMP_FORCE = 0.35;
        let isGrounded = true;

        // Peripheral configuration maps
        const keys = {};
        let moveTouch = { active: false, startY: 0, currentY: 0 };
        let lookTouch = { active: false, startX: 0, startY: 0, currentX: 0, currentY: 0 };
        let triggerShoot = false, triggerJump = false;

        const shortId = Math.floor(1000 + Math.random() * 9000).toString();

        // --- 1. GENERATE ADVANCED THREE.JS SCENE ---
        function init3D() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.04);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Tech Arena Grid mapping
            const grid = new THREE.GridHelper(100, 40, 0x00ff00, 0x222222);
            grid.position.y = -1;
            scene.add(grid);
            scene.add(new THREE.AmbientLight(0xffffff, 0.9));

            // --- ADVANCED PLAYER MODEL ARCHITECTURE ---
            opponent.group = new THREE.Group();
            
            // Neon Body Torso Mesh
            const bodyGeo = new THREE.CylinderGeometry(0.6, 0.4, 1.5, 6);
            const opponentMat = new THREE.MeshBasicMaterial({ color: 0xff0055, wireframe: true });
            const torso = new THREE.Mesh(bodyGeo, opponentMat);
            torso.position.y = 0.75;
            opponent.group.add(torso);

            // Neon Head Sphere Mesh 
            const headGeo = new THREE.SphereGeometry(0.35, 6, 6);
            const head = new THREE.Mesh(headGeo, opponentMat);
            head.position.y = 1.7;
            opponent.group.add(head);

            scene.add(opponent.group);

            // Build Client Weapon Asset Attach Point
            me.gunMesh = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 0.6), new THREE.MeshBasicMaterial({ color: 0x00ffcc }));
            scene.add(me.gunMesh);

            // Blast Projectiles Geometry
            const laserGeo = new THREE.BoxGeometry(0.08, 0.08, 4);
            me.laserMesh = new THREE.Mesh(laserGeo, new THREE.MeshBasicMaterial({ color: 0x00ffff }));
            opponent.laserMesh = new THREE.Mesh(laserGeo, new THREE.MeshBasicMaterial({ color: 0xff0055 }));
            scene.add(me.laserMesh); scene.add(opponent.laserMesh);
            me.laserMesh.visible = opponent.laserMesh.visible = false;

            // Spawn Positioning Map Configuration
            me.z = role === "host" ? 15 : -15;
            me.rotY = role === "host" ? 0 : Math.PI;

            document.getElementById("ui").style.display = "none";
            document.getElementById("crosshair").style.display = "block";
            document.getElementById("hud").style.display = "block";
            
            if ('ontouchstart' in window) {
                document.getElementById("mobile-controls").style.display = "flex";
                setupMobileInput();
            } else {
                setupPCInput();
            }
            
            // Activate Health Auto Regen Clock
            setInterval(healthRegenTask, 1000);
            animate3D();
        }

        // --- 2. MULTIPLAYER HUD & HEALTH SYSTEM RULES ---
        function healthRegenTask() {
            if (me.hp > 0 && me.hp < 100) {
                me.hp = Math.min(100, me.hp + 5); // Regenerate 5 health per second if alive
                document.getElementById("hp-val").innerText = me.hp;
            }
        }

        function triggerRespawn() {
            me.hp = 100;
            document.getElementById("hp-val").innerText = me.hp;
            me.x = (Math.random() - 0.5) * 10;
            me.z = role === "host" ? 15 : -15;
            me.y = 0;
            me.velocityY = 0;
            document.getElementById("msg").innerText = "RESPAWNED!";
            setTimeout(() => document.getElementById("msg").innerText = "", 1500);
        }

        // --- 3. DUAL PLATFORM CONTROL INTERCEPTORS ---
        function setupPCInput() {
            window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if(e.code === "Space") triggerJump = true; });
            window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
            window.addEventListener('mousedown', () => triggerShoot = true);
            
            window.addEventListener('mousemove', (e) => {
                if(document.pointerLockElement === document.body || e.buttons === 1) {
                    me.rotY -= e.movementX * 0.0025;
                    me.rotX -= e.movementY * 0.0025;
                    me.rotX = Math.max(-Math.PI/3, Math.min(Math.PI/3, me.rotX)); // Clamp pitch vertical look angles
                }
            });
            // Click viewport to lock mouse pointers natively on desktop rigs
            window.addEventListener('click', () => { document.body.requestPointerLock(); });
        }

        function setupMobileInput() {
            window.addEventListener('touchstart', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    let touch = e.changedTouches[i];
                    if(touch.target.id === "fire-btn") { triggerShoot = true; continue; }
                    if(touch.target.id === "jump-btn") { triggerJump = true; continue; }

                    if (touch.clientX < window.innerWidth / 2) {
                        moveTouch.active = true;
                        moveTouch.startY = touch.clientY;
                        moveTouch.currentY = touch.clientY;
                    } else {
                        lookTouch.active = true;
                        lookTouch.startX = touch.clientX;
                        lookTouch.startY = touch.clientY;
                        lookTouch.currentX = touch.clientX;
                        lookTouch.currentY = touch.clientY;
                    }
                }
            });

            window.addEventListener('touchmove', (e) => {
                for (let i = 0; i < e.touches.length; i++) {
                    let touch = e.touches[i];
                    if (touch.clientX < window.innerWidth / 2 && moveTouch.active) moveTouch.currentY = touch.clientY;
                    else if (touch.clientX >= window.innerWidth / 2 && lookTouch.active) {
                        lookTouch.currentX = touch.clientX;
                        lookTouch.currentY = touch.clientY;
                    }
                }
            });

            window.addEventListener('touchend', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    let touch = e.changedTouches[i];
                    if (touch.clientX < window.innerWidth / 2) moveTouch.active = false;
                    if (touch.clientX >= window.innerWidth / 2) lookTouch.active = false;
                }
            });
        }

        // --- 4. DATA TELEMETRY SYNC NETWORKING ---
        peer = new Peer(shortId);
        peer.on('open', id => document.getElementById("my-id").innerText = id);
        peer.on('error', err => { if (err.type === 'unavailable-id') window.location.reload(); });
        peer.on('connection', c => { conn = c; role = "host"; conn.on('open', init3D); setupNetwork(); });

        function connectToFriend() {
            const id = document.getElementById("peer-id").value;
            conn = peer.connect(id); role = "guest";
            conn.on('open', init3D);
            setupNetwork();
        }

        function copyRoomCode() {
            navigator.clipboard.writeText(shortId);
            document.getElementById("copy-btn").innerText = "Copied!";
            setTimeout(() => document.getElementById("copy-btn").innerText = "Copy", 2000);
        }

        function setupNetwork() {
            conn.on('data', data => {
                opponent.group.position.set(data.x, data.y, data.z);
                opponent.group.rotation.y = data.rotY;
                opponent.group.rotation.x = data.rotX; // Update remote look tilt angles
                
                if (data.shooting) {
                    opponent.laserMesh.position.set(data.lx, data.ly, data.lz);
                    opponent.laserMesh.rotation.set(data.lrotX, data.rotY, 0);
                    opponent.laserMesh.visible = true;
                } else {
                    opponent.laserMesh.visible = false;
                }

                if (data.hitMe) {
                    me.hp -= 20; // Take partial damage instead of instant death
                    document.getElementById("hp-val").innerText = Math.max(0, me.hp);
                    document.getElementById("msg").innerText = "💥 DAMAGED (-20 HP)";
                    
                    if(me.hp <= 0) {
                        document.getElementById("msg").innerText = "💀 YOU DIED! RESPAWNING...";
                        setTimeout(triggerRespawn, 3000);
                    } else {
                        setTimeout(() => { if(me.hp > 0) document.getElementById("msg").innerText = ""; }, 800);
                    }
                }
            });
        }

        // --- 5. LOGIC AND VECTOR PHYSICS ENGINE ---
        let isShooting = false;
        let hitDetected = false;

        function animate3D() {
            requestAnimationFrame(animate3D);

            // Keyboard/Desktop Turn Mapping Layout
            if (keys['arrowleft']) me.rotY += 0.03;
            if (keys['arrowright']) me.rotY -= 0.03;
            if (keys['arrowup']) me.rotX = Math.min(Math.PI/3, me.rotX + 0.03);
            if (keys['arrowdown']) me.rotX = Math.max(-Math.PI/3, me.rotX - 0.03);

            // Mobile Drag Look Delta Vector Calculus
            if (lookTouch.active) {
                let deltaX = lookTouch.currentX - lookTouch.startX;
                let deltaY = lookTouch.currentY - lookTouch.startY;
                me.rotY -= deltaX * 0.0003;
                me.rotX -= deltaY * 0.0003;
                me.rotX = Math.max(-Math.PI/3, Math.min(Math.PI/3, me.rotX));
                
                // Re-center joystick reference points dynamically to smooth out touch input
                lookTouch.startX = lookTouch.currentX;
                lookTouch.startY = lookTouch.currentY;
            }

            // Locomotion System
            let moveSpeed = 0;
            if (keys['w']) moveSpeed = 0.15;
            if (keys['s']) moveSpeed = -0.15;
            if (moveTouch.active) {
                let deltaY = moveTouch.startY - moveTouch.currentY;
                moveSpeed = Math.min(Math.max(deltaY * 0.005, -0.15), 0.15);
            }
            if(me.hp <= 0) moveSpeed = 0; // Freeze positions if player is dead

            me.x -= Math.sin(me.rotY) * moveSpeed;
            me.z -= Math.cos(me.rotY) * moveSpeed;

            // Jump Physics Engine
            if (triggerJump && isGrounded && me.hp > 0) { me.velocityY = JUMP_FORCE; isGrounded = false; }
            triggerJump = false;

            me.velocityY += GRAVITY;
            me.y += me.velocityY;
            if (me.y <= 0) { me.y = 0; me.velocityY = 0; isGrounded = true; }

            // Camera Setup With Pitch Angle Tilt (Up/Down) Enabled
            camera.position.set(me.x, me.y + 1.2, me.z);
            camera.rotation.set(me.rotX, me.rotY, 0, 'YXZ');

            // Gun Welded Display Configuration 
            me.gunMesh.position.set(me.x - Math.sin(me.rotY + 0.25) * 0.35, me.y + 0.9, me.z - Math.cos(me.rotY + 0.25) * 0.35);
            me.gunMesh.rotation.set(me.rotX, me.rotY, 0, 'YXZ');

            // Firing Register Loop Engine
            if (triggerShoot && !isShooting && me.hp > 0) {
                triggerShoot = false;
                isShooting = true;
                me.laserMesh.position.set(me.x, me.y + 1.1, me.z);
                me.laserMesh.rotation.set(me.rotX, me.rotY, 0, 'YXZ');
                me.laserMesh.visible = true;

                // Full 3D Vector Ray Intersect Target Check
                let dist = camera.position.distanceTo(opponent.group.position);
                
                // Track 3D trajectories (combining pitch angle + look direction multipliers)
                let targetX = me.x - Math.sin(me.rotY) * Math.cos(me.rotX) * dist;
                let targetY = (me.y + 1.1) + Math.sin(me.rotX) * dist;
                let targetZ = me.z - Math.cos(me.rotY) * Math.cos(me.rotX) * dist;
                
                // Bounding Sphere Check against Enemy Coordinates
                if (Math.abs(targetX - opponent.group.position.x) < 1.1 && 
                    Math.abs(targetZ - opponent.group.position.z) < 1.1 &&
                    Math.abs(targetY - (opponent.group.position.y + 1.0)) < 1.3) {
                    hitDetected = true;
                }

                setTimeout(() => { isShooting = false; me.laserMesh.visible = false; hitDetected = false; }, 180);
            } else {
                triggerShoot = false;
            }

            if (isShooting) {
                // Advance standard 3D projectile calculations down the raycast vector path
                me.laserMesh.position.x -= Math.sin(me.rotY) * Math.cos(me.rotX) * 1.8;
                me.laserMesh.position.y += Math.sin(me.rotX) * 1.8;
                me.laserMesh.position.z -= Math.cos(me.rotY) * Math.cos(me.rotX) * 1.8;
            }

            // Broadcast Pipeline Data Telemetry Packages
            if (conn && conn.open) {
                conn.send({
                    x: me.x, y: me.y, z: me.z, rotY: me.rotY, rotX: me.rotX,
                    shooting: isShooting, lx: me.laserMesh.position.x, ly: me.laserMesh.position.y, lz: me.laserMesh.position.z, lrotX: me.rotX,
                    hitMe: hitDetected
                });
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
