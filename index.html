<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Sonic Clicker ⚡</title>
    <style>
        body {
            background: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #game-container {
            text-align: center;
            background: #1e293b;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        button {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            color: white;
            padding: 15px 32px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        button:active { transform: scale(0.95); }
        #score { font-size: 3rem; margin: 1rem 0; color: #38bdf8; }
        #timer { font-size: 1.2rem; color: #94a3b8; }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>Sonic Clicker</h1>
        <p>Click as fast as you can in 10 seconds!</p>
        <div id="score">0</div>
        <div id="timer">Time left: 10s</div>
        <br>
        <button id="click-btn" onclick="handleClick()">CLICK ME!</button>
    </div>

    <script>
        let score = 0;
        let timeLeft = 10;
        let gameActive = false;
        let timerInterval;

        // URL TRICK: Check if "?cheat=true" is in the URL
        const urlParams = new URLSearchParams(window.location.search);
        const cheatMode = urlParams.get('cheat') === 'true';

        function handleClick() {
            if (timeLeft <= 0) return;
            
            if (!gameActive) {
                gameActive = true;
                startTimer();
            }

            // If cheat mode is active, every click gives 10 points!
            score += cheatMode ? 10 : 1;
            document.getElementById('score').innerText = score;
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = `Time left: ${timeLeft}s`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('click-btn').disabled = true;
                    document.getElementById('click-btn').innerText = "Game Over!";
                    alert(`Game over! You scored ${score} points!`);
                }
            }, 1000);
        }
    </script>
</body>
</html>
