<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ CYBER BLAST: JOYSTICK UPDATE ⚡</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: monospace; color: #fff; user-select: none; touch-action: none; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.9); padding: 15px; border-radius: 8px; border: 1px solid #00ffcc; width: 85%; max-width: 320px; box-shadow: 0 0 15px rgba(0,255,204,0.3); }
        input, button { padding: 12px; margin: 6px 0; border-radius: 6px; border: none; font-family: monospace; font-weight: bold; width: 100%; box-sizing: border-box;}
        input { background: #111; color: #fff; border: 1px solid #333; text-align: center; font-size: 1.2rem; }
        button { background: #00ffcc; color: #000; cursor: pointer; font-size: 1rem; text-transform: uppercase; }
        
        .setting-row { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; font-size: 12px; }
        .setting-row input[type=range] { width: 60%; margin: 0; }

        #copy-btn { background: #334155; color: #fff; padding: 6px 12px; font-size: 11px; display: inline-block; width: auto; margin-left: 10px; border-radius: 4px;}
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00ffcc; font-size: 24px; pointer-events: none; z-index: 5; display: none;}
        #msg { position: absolute; top: 15%; width: 100%; text-align: center; font-size: 22px; color: #ff0055; text-shadow: 0 0 8px #ff0055; z-index: 6; pointer-events: none;}
        
        /* HUD Grid */
        #hud { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); padding: 12px; border-radius: 5px; font-size: 16px; border: 1px solid #ff0055; display: none; z-index: 7; min-width: 140px;}
        
        /* Mobile Overlay Buttons */
        #mobile-controls { display: none; position: absolute; bottom: 30px; right: 30px; z-index: 8; gap: 15px; }
        .m-btn { width: 70px; height: 70px; border-radius: 50%; color: white; font-weight: bold; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px currentColor; }
        #fire-btn { background: rgba(255, 0, 85, 0.6); border: 3px solid #ff0055; color: #ff0055;}
        #jump-btn { background: rgba(0, 255, 204, 0.6); border: 3px solid #00ffcc; color: #00ffcc;}

        /* --- VIRTUAL JOYSTICK CIRCLE UI --- */
        #joystick-container {
            display: none;
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 110px;
            height: 110px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 255, 204, 0.4);
            border-radius: 50%;
            z-index: 9;
            pointer-events: none; /* Event parsing passed to window object instead */
        }
        #joystick-knob {
            position: absolute;
            top: 35px;
            left: 35px;
            width: 40px;
            height: 40px;
            background: rgba(0, 255, 204, 0.7);
            box-shadow: 0 0 10px #00ffcc;
            border-radius: 50%;
            transition: background 0.2s;
        }
    </style>
</head>
<body>

    <div id="crosshair">⊙</div>
    <div id="msg"></div>
    <div id="hud">
        <div>HEALTH: <span id="hp-val" style="color: #00ffcc; font-weight:bold;">100</span>%</div>
        <div style="font-size:11px; margin-top:5px; color:#aaa;">PLAYERS IN LOBBY: <span id="lobby-count" style="color:#fff;">1</span></div>
    </div>

    <div id="joystick-container">
        <div id="joystick-knob"></div>
    </div>

    <div id="mobile-controls">
        <div id="jump-btn" class="m-btn">JUMP</div>
        <div id="fire-btn" class="m-btn">FIRE</div>
    </div>

    <div id="ui">
        <h3>⚡ Cyber Blast Multi-Mesh</h3>
        
        <div class="setting-row">
            <label>AIM SENSITIVITY:</label>
            <input type="range" id="sens-slider" min="0.0001" max="0.0050" step="0.0001" value="0.0010" oninput="updateSens(this.value)">
            <span id="sens-val">0.0010</span>
        </div>
        
        <p>Your Lobby ID: <b id="my-id" style="color:#00ffcc; font-size: 1.4rem;">...</b> 
           <button id="copy-btn" onclick="copyRoomCode()">Copy</button>
        </p>
        <input type="number" id="peer-id" placeholder="Enter Host Lobby ID" pattern="\d*"><br>
        <button onclick="connectToLobbyHost()">Join Match</button>
    </div>

    <script>
        let myPeerId = "";
        let connections = {}; 
        let remotePlayers = {}; 
        let scene, camera, renderer;
        
        let sensitivity = 0.0010; 
        let me = { id: "", x: (Math.random() - 0.5) * 15, y: 0, z: (Math.random() - 0.5) * 15, rotY: 0, rotX: 0, velocityY: 0, hp: 100, gunMesh: null, laserMesh: null };
        
        const GRAVITY = -0.015;
        const JUMP_FORCE = 0.35;
        let isGrounded = true;

        const keys = {};
        
        // Mobile input telemetry data tracking states
        let moveTouch = { active: false, id: null, startX: 0, startY: 0, currentX: 0, currentY: 0, outX: 0, outY: 0 };
        let lookTouch = { active: false, id: null, startX: 0, startY: 0, currentX: 0, currentY: 0 };
        let triggerShoot = false, triggerJump = false;

        const shortId = Math.floor(1000 + Math.random() * 9000).toString();

        function updateSens(val) {
            sensitivity = parseFloat(val);
            document.getElementById("sens-val").innerText = sensitivity.toFixed(4);
        }

        // --- 1. INITIALIZE SCENE GRAPHICS ---
        function initGameArena() {
            document.getElementById("ui").style.display = "none";
            document.getElementById("crosshair").style.display = "block";
            document.getElementById("hud").style.display = "block";

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.03);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const grid = new THREE.GridHelper(120, 50, 0x00ffcc, 0x112211);
            grid.position.y = -1;
            scene.add(grid);
            scene.add(new THREE.AmbientLight(0xffffff, 0.9));

            me.gunMesh = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 0.5), new THREE.MeshBasicMaterial({ color: 0x00ffcc }));
            scene.add(me.gunMesh);

            me.laserMesh = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 4), new THREE.MeshBasicMaterial({ color: 0x00ffff }));
            scene.add(me.laserMesh);
            me.laserMesh.visible = false;

            if ('ontouchstart' in window) {
                document.getElementById("mobile-controls").style.display = "flex";
                document.getElementById("joystick-container").style.display = "block";
                setupMobileInput();
            } else {
                setupPCInput();
            }
            
            setInterval(() => {
                if (me.hp > 0 && me.hp < 100) {
                    me.hp = Math.min(100, me.hp + 4);
                    document.getElementById("hp-val").innerText = me.hp;
                }
            }, 1000);

            animateGameLoop();
        }

        // --- 2. MULTIPLAYER ENTITY MANIPULATION ---
        function createRemotePlayerMesh(id) {
            let pGroup = new THREE.Group();
            let pMat = new THREE.MeshBasicMaterial({ color: 0xff0055, wireframe: true });
            
            let torso = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.3, 1.4, 6), pMat);
            torso.position.y = 0.7;
            pGroup.add(torso);

            let head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 6, 6), pMat);
            head.position.y = 1.5;
            pGroup.add(head);

            let rLaser = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 4), new THREE.MeshBasicMaterial({ color: 0xff0055 }));
            scene.add(rLaser);
            rLaser.visible = false;

            scene.add(pGroup);
            remotePlayers[id] = { group: pGroup, laser: rLaser };
            updateLobbyHUDCount();
        }

        function removeRemotePlayerMesh(id) {
            if(remotePlayers[id]) {
                scene.remove(remotePlayers[id].group);
                scene.remove(remotePlayers[id].laser);
                delete remotePlayers[id];
            }
            updateLobbyHUDCount();
        }

        function updateLobbyHUDCount() {
            document.getElementById("lobby-count").innerText = Object.keys(remotePlayers).length + 1;
        }

        // --- 3. INPUT SYSTEMS AND VIRTUAL JOYSTICK PROCESSING ---
        function setupPCInput() {
            window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if(e.code === "Space") triggerJump = true; });
            window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
            window.addEventListener('mousedown', () => triggerShoot = true);
            
            window.addEventListener('mousemove', (e) => {
                if(document.pointerLockElement === document.body || e.buttons === 1) {
                    me.rotY -= e.movementX * sensitivity;
                    me.rotX -= e.movementY * sensitivity;
                    me.rotX = Math.max(-Math.PI/3, Math.min(Math.PI/3, me.rotX));
                }
            });
            window.addEventListener('click', () => { document.body.requestPointerLock(); });
        }

        function setupMobileInput() {
            const joystickContainer = document.getElementById("joystick-container");
            const joystickKnob = document.getElementById("joystick-knob");
            const maxRadius = 35; // Maximum radius the joystick knob can drift inside outer ring

            window.addEventListener('touchstart', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    let touch = e.changedTouches[i];
                    if(touch.target.id === "fire-btn") { triggerShoot = true; continue; }
                    if(touch.target.id === "jump-btn") { triggerJump = true; continue; }

                    // Left Screen Area: Spawn/Lock movement joystick tracking metrics
                    if (touch.clientX < window.innerWidth / 2 && !moveTouch.active) {
                        moveTouch.active = true;
                        moveTouch.id = touch.identifier;
                        
                        // Dynamically snap joystick visual frame base directly onto thumb target coordinate
                        joystickContainer.style.left = `${touch.clientX - 55}px`;
                        joystickContainer.style.bottom = `${window.innerHeight - touch.clientY - 55}px`;
                        
                        moveTouch.startX = touch.clientX;
                        moveTouch.startY = touch.clientY;
                        moveTouch.currentX = touch.clientX;
                        moveTouch.currentY = touch.clientY;
                    } 
                    // Right Screen Area: Look Swipe Vector Initialization
                    else if (touch.clientX >= window.innerWidth / 2 && !lookTouch.active) {
                        lookTouch.active = true;
                        lookTouch.id = touch.identifier;
                        lookTouch.startX = touch.clientX;
                        lookTouch.startY = touch.clientY;
                        lookTouch.currentX = touch.clientX;
                        lookTouch.currentY = touch.clientY;
                    }
                }
            });

            window.addEventListener('touchmove', (e) => {
                for (let i = 0; i < e.touches.length; i++) {
                    let touch = e.touches[i];
                    
                    if (touch.identifier === moveTouch.id && moveTouch.active) {
                        moveTouch.currentX = touch.clientX;
                        moveTouch.currentY = touch.clientY;

                        // Calculate spatial drag delta distances
                        let dx = moveTouch.currentX - moveTouch.startX;
                        let dy = moveTouch.currentY - moveTouch.startY;
                        let distance = Math.sqrt(dx * dx + dy * dy);

                        // Clamp visual coordinate transforms to bounded outer parameters
                        if (distance > maxRadius) {
                            dx = (dx / distance) * maxRadius;
                            dy = (dy / distance) * maxRadius;
                            distance = maxRadius;
                        }

                        // Reposition visual joystick knob asset
                        joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;

                        // Normalize output metrics between -1.0 and 1.0 for the physics engine
                        moveTouch.outX = dx / maxRadius;
                        moveTouch.outY = dy / maxRadius;
                    } 
                    else if (touch.identifier === lookTouch.id && lookTouch.active) {
                        lookTouch.currentX = touch.clientX;
                        lookTouch.currentY = touch.clientY;
                    }
                }
            });

            window.addEventListener('touchend', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    let touch = e.changedTouches[i];
                    
                    if (touch.identifier === moveTouch.id) {
                        moveTouch.active = false;
                        moveTouch.id = null;
                        moveTouch.outX = 0;
                        moveTouch.outY = 0;
                        
                        // Reset visual indicators to absolute base position templates
                        joystickKnob.style.transform = `translate(0px, 0px)`;
                        joystickContainer.style.left = `40px`;
                        joystickContainer.style.bottom = `40px`;
                    }
                    if (touch.identifier === lookTouch.id) {
                        lookTouch.active = false;
                        lookTouch.id = null;
                    }
                }
            });
        }

        // --- 4. MESH P2P NETWORKING LOGIC ---
        let isInitialized = false;

        let peer = new Peer(shortId);
        peer.on('open', id => { myPeerId = id; me.id = id; document.getElementById("my-id").innerText = id; });
        peer.on('error', err => { if (err.type === 'unavailable-id') window.location.reload(); });
        
        peer.on('connection', incomingConn => { handleDataSyncConnection(incomingConn); });

        function connectToLobbyHost() {
            let targetHostId = document.getElementById("peer-id").value;
            let targetConn = peer.connect(targetHostId);
            handleDataSyncConnection(targetConn);
        }

        function handleDataSyncConnection(c) {
            c.on('open', () => {
                connections[c.peer] = c;
                if(!isInitialized) { initGameArena(); isInitialized = true; }
                createRemotePlayerMesh(c.peer);
                broadcastPacket({ type: "mesh-introduction", activePeers: Object.keys(connections) });
            });

            c.on('data', data => {
                if(data.type === "mesh-introduction") {
                    data.activePeers.forEach(id => {
                        if(id !== myPeerId && !connections[id]) {
                            let newConn = peer.connect(id);
                            handleDataSyncConnection(newConn);
                        }
                    });
                }
                
                if(data.type === "state-update") {
                    let p = remotePlayers[c.peer];
                    if(p) {
                        p.group.position.set(data.x, data.y, data.z);
                        p.group.rotation.set(data.rotX, data.rotY, 0, 'YXZ');
                        if (data.shooting) {
                            p.laser.position.set(data.lx, data.ly, data.lz);
                            p.laser.rotation.set(data.rotX, data.rotY, 0, 'YXZ');
                            p.laser.visible = true;
                        } else {
                            p.laser.visible = false;
                        }
                    }
                }

                if(data.type === "hit-notification" && data.targetId === myPeerId) {
                    me.hp -= 20;
                    document.getElementById("hp-val").innerText = Math.max(0, me.hp);
                    document.getElementById("msg").innerText = "💥 HIT BY " + c.peer + " (-20 HP)";
                    if(me.hp <= 0) {
                        document.getElementById("msg").innerText = "💀 ELIMINATED! RESPAWNING...";
                        setTimeout(() => {
                            me.hp = 100;
                            document.getElementById("hp-val").innerText = 100;
                            me.x = (Math.random() - 0.5) * 20; me.z = (Math.random() - 0.5) * 20; me.y = 0;
                            document.getElementById("msg").innerText = "";
                        }, 3000);
                    } else {
                        setTimeout(() => { if(me.hp > 0) document.getElementById("msg").innerText = ""; }, 800);
                    }
                }
            });

            c.on('close', () => { removeRemotePlayerMesh(c.peer); delete connections[c.peer]; });
        }

        function broadcastPacket(pkt) {
            for(let id in connections) {
                if(connections[id].open) connections[id].send(pkt);
            }
        }

        function copyRoomCode() {
            navigator.clipboard.writeText(shortId);
            document.getElementById("copy-btn").innerText = "Copied!";
            setTimeout(() => document.getElementById("copy-btn").innerText = "Copy", 2000);
        }

        // --- 5. RUNTIME PHYSICS ENGINE LOOP ---
        let isShooting = false;

        function animateGameLoop() {
            requestAnimationFrame(animateGameLoop);

            // Turn Engine Keyboard / Arrow maps
            if (keys['arrowleft']) me.rotY += 0.03;
            if (keys['arrowright']) me.rotY -= 0.03;
            if (keys['arrowup']) me.rotX = Math.min(Math.PI/3, me.rotX + 0.03);
            if (keys['arrowdown']) me.rotX = Math.max(-Math.PI/3, me.rotX - 0.03);

            // Right Screen Swiping Calculations
            if (lookTouch.active) {
                let deltaX = lookTouch.currentX - lookTouch.startX;
                let deltaY = lookTouch.currentY - lookTouch.startY;
                me.rotY -= deltaX * (sensitivity * 0.15);
                me.rotX -= deltaY * (sensitivity * 0.15);
                me.rotX = Math.max(-Math.PI/3, Math.min(Math.PI/3, me.rotX));
                lookTouch.startX = lookTouch.currentX;
                lookTouch.startY = lookTouch.currentY;
            }

            // --- LOCOMOTION TRANSLATION VECTOR LOGIC ---
            let forwardSpeed = 0;
            let strafeSpeed = 0;

            if (keys['w']) forwardSpeed = 0.14;
            if (keys['s']) forwardSpeed = -0.14;
            if (keys['a']) strafeSpeed = -0.10;
            if (keys['d']) strafeSpeed = 0.10;

            // Handle virtual joystick physics vectors
            if (moveTouch.active) {
                // outY is negative when dragging up, mapping to forward motion
                forwardSpeed = -moveTouch.outY * 0.14;
                strafeSpeed = moveTouch.outX * 0.10;
            }
            if(me.hp <= 0) { forwardSpeed = 0; strafeSpeed = 0; }

            // Apply direction transforms matching local orientation profiles
            me.x -= Math.sin(me.rotY) * forwardSpeed - Math.cos(me.rotY) * strafeSpeed;
            me.z -= Math.cos(me.rotY) * forwardSpeed + Math.sin(me.rotY) * strafeSpeed;

            // Vertical Velocity Interceptors
            if (triggerJump && isGrounded && me.hp > 0) { me.velocityY = JUMP_FORCE; isGrounded = false; }
            triggerJump = false;

            me.velocityY += GRAVITY;
            me.y += me.velocityY;
            if (me.y <= 0) { me.y = 0; me.velocityY = 0; isGrounded = true; }

            camera.position.set(me.x, me.y + 1.1, me.z);
            camera.rotation.set(me.rotX, me.rotY, 0, 'YXZ');

            me.gunMesh.position.set(me.x - Math.sin(me.rotY + 0.25) * 0.35, me.y + 0.85, me.z - Math.cos(me.rotY + 0.25) * 0.35);
            me.gunMesh.rotation.set(me.rotX, me.rotY, 0, 'YXZ');

            if (triggerShoot && !isShooting && me.hp > 0) {
                triggerShoot = false;
                isShooting = true;
                me.laserMesh.position.set(me.x, me.y + 1.0, me.z);
                me.laserMesh.rotation.set(me.rotX, me.rotY, 0, 'YXZ');
                me.laserMesh.visible = true;

                for(let id in remotePlayers) {
                    let targetPlayer = remotePlayers[id].group;
                    let dist = camera.position.distanceTo(targetPlayer.position);
                    
                    let targetX = me.x - Math.sin(me.rotY) * Math.cos(me.rotX) * dist;
                    let targetY = (me.y + 1.0) + Math.sin(me.rotX) * dist;
                    let targetZ = me.z - Math.cos(me.rotY) * Math.cos(me.rotX) * dist;
                    
                    if (Math.abs(targetX - targetPlayer.position.x) < 1.0 && 
                        Math.abs(targetZ - targetPlayer.position.z) < 1.0 &&
                        Math.abs(targetY - (targetPlayer.position.y + 0.8)) < 1.3) {
                        
                        broadcastPacket({ type: "hit-notification", targetId: id });
                        document.getElementById("msg").innerText = "🎯 REGISTERED HIT!";
                        setTimeout(() => document.getElementById("msg").innerText = "", 1000);
                    }
                }

                setTimeout(() => { isShooting = false; me.laserMesh.visible = false; }, 150);
            } else {
                triggerShoot = false;
            }

            if (isShooting) {
                me.laserMesh.position.x -= Math.sin(me.rotY) * Math.cos(me.rotX) * 1.8;
                me.laserMesh.position.y += Math.sin(me.rotX) * 1.8;
                me.laserMesh.position.z -= Math.cos(me.rotY) * Math.cos(me.rotX) * 1.8;
            }

            broadcastPacket({
                type: "state-update",
                x: me.x, y: me.y, z: me.z, rotY: me.rotY, rotX: me.rotX,
                shooting: isShooting, lx: me.laserMesh.position.x, ly: me.laserMesh.position.y, lz: me.laserMesh.position.z
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
    </html>
